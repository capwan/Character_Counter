<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter Pro</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  
  <div class="container">
    <div class="header">
        <h1>Character Counter</h1>
        <p class="subtitle">Analyze your text in real-time</p>
    </div>

    <div class="text-area-wrapper">
        <textarea id="textarea" placeholder="Start typing or paste your text here..."></textarea>
        
        <div class="controls">
            <button id="btn-copy" class="btn">Copy Text</button>
            <button id="btn-clear" class="btn btn-outline">Clear All</button>
        </div>
    </div>

    <div class="count">
      <div class="box">
        <h5 id="characters">0</h5>
        <p>Characters</p>
      </div>

      <div class="box">
        <h5 id="words">0</h5>
        <p>Words</p>
      </div>

      <div class="box">
        <h5 id="sentences">0</h5>
        <p>Sentences</p>
      </div>

      <div class="box">
        <h5 id="paragraphs">0</h5>
        <p>Paragraphs</p>
      </div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
